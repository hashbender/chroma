name: Sync Upstream
on:
  schedule:
    - cron: '*/30 * * * *' # every 30 min
  workflow_dispatch:
jobs:
  sync:
    runs-on: tenki-standard-autoscale
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }} # PAT with repo scope
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/chroma-core/chroma.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main